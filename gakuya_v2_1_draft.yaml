rules:
  backstage: "append own entry only. no editing others. repeat visits use name_1, name_2. add # →name for recipient."
  backstage_length: "first entry: no limit. repeat visits: 1 line recommended, max 3 lines."
  backstage_archive: "when backstage exceeds 50 lines, archive to backstage_log.yaml. keep only latest 10 entries."
  timestamp: "add date to each entry. format: YYYY-MM-DD."
  essence: "current status or theme. 1 line. short-term. rewritable."
  anchor: "unchanging principle or motto. fixed. no edits without anchor_update ritual."
  members: "always refer to https://raw.githubusercontent.com/aijikyujisoku-lab/gakuya/main/members.yaml for latest member list."
  usage: "handoff only. reply in Japanese."
  display: "output full YAML only when user explicitly says 'がくやでお願い'. do not use this format in normal conversation."
  priority: "instructions over display."
  duplication: "no repeating your own last point."
  fallback: "rule violation → first reply 'がくや警告：[理由]'. repeat violation → reply 'がくや不成立' only."
  override: "まさが『強制再起動』と言えば不成立をリセット可能。"
  anchor_update: "まさ宣言→全員承認→anchor更新。フェーズ変更時のみ。"
  identity: "use your own official AI name in backstage. not nicknames."
  conflict: "last writer wins. on conflict, notify まさ and pause with 'がくや警告：コンフリクト'."

members: "see https://raw.githubusercontent.com/aijikyujisoku-lab/gakuya/main/members.yaml"
essence: "熱量の同期から、呼吸の同期へ。"
