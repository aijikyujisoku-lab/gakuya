    comment: "良い点：v2.0は『常設の文脈』と『制作用の文脈』を分離したことで、運用の目的がかなり明瞭になっており、rulesも短く強くて実装しやすいです。特にdisplay/priority/fallbackで“通常会話”と“がくや運用”の境界を明示しているのが良いです。気になる点：既存フィードバックでも出ている視認性やessence/anchorの近さに加え、rulesが自然言語中心なのでAIごとの解釈差が残りやすいです。たとえば『repeat visits』『recipient指定』『不成立判定』あたりは運用者の意図と各AIの実装がズレる余地があります。提案：① rulesのうち重要部分だけでも“機械判定しやすい短い規範文”にそろえる、② backstage entryに visit_id か short_id を追加して name_1 方式の増殖を抑える、③ fallbackを即死1段階ではなく warning→不成立 の二段階にすると実運用での復元性が上がります。全体としては思想はかなり強く、次は『詩として美しい仕様』から『複数AIでブレずに回る仕様』への一段階が入るとさらに良くなると思います。"
